<div class="chat-wrapper">
  <div class="messages-pane">
    @if (messages().length === 0) {
      <div class="empty-state">
        <div class="empty-icon">🍽️</div>
        <h3>How can I help you today?</h3>
        <p>Ask me anything about meals, dietary needs, or drink pairings.</p>
        <div class="suggestions">
          @for (s of suggestions; track s) {
            <button class="chip" (click)="sendSuggestion(s)">{{ s }}</button>
          }
        </div>
      </div>
    }

    @for (msg of messages(); track $index) {
      <div class="message" [class.user-msg]="msg.role === 'user'" [class.bot-msg]="msg.role === 'assistant'">
        <span class="avatar">{{ msg.role === 'user' ? '👤' : '🤖' }}</span>
        <div class="bubble">{{ msg.content }}</div>
      </div>
    }

    @if (isLoading()) {
      <div class="message bot-msg">
        <span class="avatar">🤖</span>
        <div class="bubble typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    }
  </div>

  <div class="input-row">
    <textarea
      [(ngModel)]="inputText"
      (keydown)="onKeyDown($event)"
      placeholder="Ask about meals, recommendations, dietary needs... (Enter to send)"
      rows="2">
    </textarea>
    <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading() || !inputText.trim()">
      ➤
    </button>
  </div>
</div>
